name: "SpecLock Constraint Check"
description: "Audit changed files against SpecLock constraints. Blocks PRs that violate locked constraints."
author: "Sandeep Roy (https://github.com/sgroy10)"

branding:
  icon: "shield"
  color: "blue"

inputs:
  project-dir:
    description: "Project directory containing .speclock/"
    required: false
    default: "."
  fail-on-conflict:
    description: "Fail the workflow if HIGH conflicts are detected"
    required: false
    default: "true"
  comment-on-pr:
    description: "Post results as a PR comment"
    required: false
    default: "true"
  node-version:
    description: "Node.js version to use"
    required: false
    default: "18"

outputs:
  passed:
    description: "Whether all checks passed (true/false)"
    value: ${{ steps.audit.outputs.passed }}
  violations:
    description: "Number of violations found"
    value: ${{ steps.audit.outputs.violations }}

runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install SpecLock
      shell: bash
      run: npm install -g speclock@latest

    - name: Run SpecLock Audit
      id: audit
      shell: bash
      working-directory: ${{ inputs.project-dir }}
      run: |
        echo "## SpecLock Constraint Audit" > $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        # Check if .speclock exists
        if [ ! -d ".speclock" ]; then
          echo "No .speclock/ directory found. Skipping audit." >> $GITHUB_STEP_SUMMARY
          echo "passed=true" >> $GITHUB_OUTPUT
          echo "violations=0" >> $GITHUB_OUTPUT
          exit 0
        fi

        # Run conflict check against changed files
        AUDIT_OUTPUT=$(npx speclock audit 2>&1) || true
        AUDIT_EXIT=$?

        echo '```' >> $GITHUB_STEP_SUMMARY
        echo "$AUDIT_OUTPUT" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY

        # Also run audit chain verification
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Audit Chain Integrity" >> $GITHUB_STEP_SUMMARY
        VERIFY_OUTPUT=$(npx speclock audit-verify 2>&1) || true
        echo '```' >> $GITHUB_STEP_SUMMARY
        echo "$VERIFY_OUTPUT" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY

        if [ $AUDIT_EXIT -eq 0 ]; then
          echo "passed=true" >> $GITHUB_OUTPUT
          echo "violations=0" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Result: PASSED** - No constraint violations found." >> $GITHUB_STEP_SUMMARY
        else
          VIOLATION_COUNT=$(echo "$AUDIT_OUTPUT" | grep -c "\[HIGH\]\|\[MEDIUM\]" || echo "0")
          echo "passed=false" >> $GITHUB_OUTPUT
          echo "violations=$VIOLATION_COUNT" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Result: FAILED** - $VIOLATION_COUNT constraint violation(s) detected." >> $GITHUB_STEP_SUMMARY
        fi

    - name: Comment on PR
      if: inputs.comment-on-pr == 'true' && github.event_name == 'pull_request'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        if [ "${{ steps.audit.outputs.passed }}" == "true" ]; then
          BODY="## SpecLock Audit: PASSED\n\nNo constraint violations found. All changes are compliant with project locks."
        else
          BODY="## SpecLock Audit: FAILED\n\n**${{ steps.audit.outputs.violations }} violation(s) detected.**\n\nSome changes conflict with locked constraints. Review the workflow summary for details.\n\nTo resolve:\n- Remove conflicting changes, OR\n- Unlock the constraint with \`npx speclock lock remove <lockId>\`"
        fi
        gh pr comment ${{ github.event.pull_request.number }} --body "$(echo -e "$BODY")" || echo "Could not post PR comment"

    - name: Fail on violations
      if: inputs.fail-on-conflict == 'true' && steps.audit.outputs.passed == 'false'
      shell: bash
      run: |
        echo "SpecLock audit failed with ${{ steps.audit.outputs.violations }} violation(s)."
        exit 1
