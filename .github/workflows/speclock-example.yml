name: SpecLock Audit
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  speclock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: ./.github/actions/speclock
        with:
          mode: warn
